name: Module Release

on:
  pull_request:
    types: [closed]
    branches:
        - main

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

      # Detect changed modules
        - name: Detect changed modules
          id: changes
          run: |
            MODULES=$(git diff --name-only \
                ${{ github.event.pull_request.base.sha }} \
                ${{ github.sha }} \
                | grep '^modules/' \
                | cut -d/ -f2 \
                | sort -u)

            echo "modules=$MODULES" >> $GITHUB_OUTPUT

      # Loop through each changed module
        - name: Release modules
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            for MODULE in ${{ steps.changes.outputs.modules }}; do

                echo "Processing $MODULE"

                # Get latest tag for this module
                LAST_TAG=$(git tag --list "$MODULE/v*" --sort=-v:refname | head -n 1)

                if [ -z "$LAST_TAG" ]; then
                VERSION="0.0.0"
                else
                VERSION=${LAST_TAG#"$MODULE/v"}
                fi

                IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

                # Get commit messages from PR
                COMMITS=$(git log \
                ${{ github.event.pull_request.base.sha }}..${{ github.sha }} \
                --pretty=%s)

                # Determine bump type
                if echo "$COMMITS" | grep -q "BREAKING CHANGE\|feat!:"; then
                MAJOR=$((MAJOR+1))
                MINOR=0
                PATCH=0
                elif echo "$COMMITS" | grep -q "^feat:"; then
                MINOR=$((MINOR+1))
                PATCH=0
                else
                PATCH=$((PATCH+1))
                fi

                NEW_VERSION="$MAJOR.$MINOR.$PATCH"
                TAG="$MODULE/v$NEW_VERSION"

                echo "Creating tag $TAG"

                git tag "$TAG"
                git push origin "$TAG"

                gh release create "$TAG" \
                --title "$MODULE v$NEW_VERSION" \
                --notes "Release for $MODULE module"
            done
